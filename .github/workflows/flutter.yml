name: Flutter CI/CD

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_UNITEAGAME }}' > $HOME/firebase-service-account.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build web
        run: flutter build web --release

      - name: Deploy Firestore Rules and Indexes
        run: firebase deploy --only firestore:rules,firestore:indexes --project unite-a-gamer
        env:
          GOOGLE_APPLICATION_CREDENTIALS: $HOME/firebase-service-account.json

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_UNITEAGAME }}
          projectId: unite-a-gamer
          channelId: live
