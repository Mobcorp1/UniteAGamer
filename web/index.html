<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UAG Arc Raiders Hub standalone companion app.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0A0925">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UAG Arc Raiders Hub">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>UAG Arc Raiders Hub</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0A0925;
    }

    body {
      position: fixed;
      inset: 0;
    }

    #loading {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0925;
      color: #00ffff;
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-semantics-host,
    flt-semantics,
    flt-platform-view,
    canvas {
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      max-width: none !important;
      max-height: none !important;
      display: block !important;
    }
  </style>
</head>
<body>
  <div id="loading">Loading UAG Arc Raiders Hub</div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('loading');
      if (loading) {
        loading.remove();
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
