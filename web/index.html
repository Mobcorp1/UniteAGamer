<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UAG Traders Hub standalone app.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UAG Traders Hub">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>UAG Traders Hub</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #090529;
    }

    body {
      position: fixed;
      inset: 0;
      display: block;
    }

    flutter-view,
    flt-glass-pane,
    flt-scene-host,
    flt-scene,
    canvas {
      width: 100% !important;
      height: 100% !important;
      min-width: 100% !important;
      min-height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      left: 0 !important;
      top: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      position: absolute !important;
    }

    #loading {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #15104a 0%, #090529 52%, #050316 100%);
      color: #19f7ff;
      font-family: monospace;
      font-size: 18px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      z-index: 9999;
    }
  </style>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
</head>
<body>
  <div id="loading">Loading UAG Traders Hub</div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
