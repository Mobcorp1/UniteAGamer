<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="UAG Traders Hub standalone app.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#090529">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="UAG Traders Hub">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>UAG Traders Hub</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      min-width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #090529;
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    flt-glass-pane,
    flutter-view,
    flutter-view > flt-glass-pane,
    #flutter_target {
      width: 100vw !important;
      height: 100vh !important;
      min-width: 100vw !important;
      min-height: 100vh !important;
      display: block !important;
      position: fixed !important;
      inset: 0 !important;
      background: #090529 !important;
    }

    canvas,
    flt-scene-host,
    flt-scene,
    flt-platform-view {
      width: 100% !important;
      height: 100% !important;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(0,255,255,0.08), transparent 42%), #090529;
      color: #00ffff;
      font-family: Arial, sans-serif;
      letter-spacing: 0.08em;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="loading">LOADING UAG TRADERS HUB</div>
  <div id="flutter_target"></div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) loading.remove();
    });
  </script>
</body>
</html>
