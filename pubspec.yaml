name: uag_traders_hub
description: "UAG Traders Hub standalone app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^17.2.2
  animated_text_kit: ^4.2.3
  shared_preferences: ^2.5.3
  share_plus: ^10.0.2
  local_auth: ^3.0.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/uag_taders_app_icon.webp"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_foreground: "assets/icon/uag_taders_app_icon.webp"
  adaptive_icon_background: "#0A0925"

flutter_native_splash:
  color: "#090529"
  image: assets/icon/uag_taders_app_icon.webp
  android: true
  ios: true
  android_12:
    color: "#090529"
    image: assets/icon/uag_traders_icon_transparent.webp

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/arc_raiders/banners/
    - assets/arc_raiders/blueprints/
    - assets/arc_raiders/scrappy_resources/

  fonts:
    - family: VT323
      fonts:
        - asset: assets/fonts/VT323-Regular.ttf

    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700

    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
